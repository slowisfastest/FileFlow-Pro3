name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - run: pip install pyinstaller pdfplumber pdf2docx Pillow PyMuPDF python-docx openpyxl python-pptx reportlab lxml paddleocr opencv-python numpy
    - run: python download_ocr_models.py
      continue-on-error: true
    - run: python create_spec.py
    - run: pyinstaller --clean --noconfirm FileFlowPro.spec
    - uses: actions/upload-artifact@v4
      with:
        name: FileFlowPro
        path: dist/FileFlowPro.exe
