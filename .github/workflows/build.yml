name: Build Windows EXE with OCR Models

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # ─────────────────────────────────────────────
    # 步骤 1：安装 PyInstaller
    # ─────────────────────────────────────────────
    - name: Install PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    # ─────────────────────────────────────────────
    # 步骤 2：安装 PyTorch（必须先装，否则 paddle 可能冲突）
    # ─────────────────────────────────────────────
    - name: Install PyTorch (CPU)
      run: |
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

    # ─────────────────────────────────────────────
    # 步骤 3：安装 PaddlePaddle（多版本 fallback）
    # ─────────────────────────────────────────────
    - name: Install PaddlePaddle (with fallback)
      shell: pwsh
      run: |
        $success = $false
        $urls = @(
          "https://www.paddlepaddle.org.cn/whl/windows/mkl/avx/stable.html",
          "https://mirror.baidu.com/pypi/simple"
        )
        $versions = @("2.6.1", "2.6.0", "2.5.2")

        foreach ($ver in $versions) {
          foreach ($url in $urls) {
            Write-Host "尝试安装 paddlepaddle==$ver 来源: $url"
            pip install "paddlepaddle==$ver" -f $url 2>&1
            if ($LASTEXITCODE -eq 0) {
              Write-Host "PaddlePaddle $ver 安装成功！"
              $success = $true
              break
            }
          }
          if ($success) { break }
        }

        if (-not $success) {
          Write-Host "所有版本尝试失败，尝试从 PyPI 直接安装..."
          pip install paddlepaddle
        }

        python -c "import paddle; print('PaddlePaddle version:', paddle.__version__)"

    # ─────────────────────────────────────────────
    # 步骤 4：安装 PaddleOCR 及其他全部依赖
    # （requirements.txt 中排除 paddlepaddle 避免覆盖）
    # ─────────────────────────────────────────────
    - name: Install PaddleOCR and remaining dependencies
      run: |
        pip install paddleocr>=2.7.0
        pip install easyocr>=1.7.0
        pip install pdfplumber>=0.10.0 pdf2docx>=0.5.6 Pillow>=10.0.0
        pip install PyMuPDF>=1.23.0 python-docx>=0.8.11 openpyxl>=3.1.0
        pip install python-pptx>=0.6.21 reportlab>=4.0.0 lxml>=4.9.0
        pip install opencv-python>=4.8.0 numpy>=1.24.0
        pip install scikit-image>=0.21.0 scipy>=1.11.0
        pip install shapely>=2.0.0 imgaug>=0.4.0 lmdb>=1.4.0
        pip install pyclipper>=1.3.0 pyyaml>=6.0.1 tqdm>=4.66.0 packaging>=23.0

    # ─────────────────────────────────────────────
    # 步骤 5：验证所有关键依赖（任一失败则中止）
    # ─────────────────────────────────────────────
    - name: Verify all OCR dependencies
      run: |
        python -c "import paddle; print('Paddle:', paddle.__version__)"
        python -c "import paddleocr; print('PaddleOCR: OK')"
        python -c "from paddleocr import PaddleOCR; print('PaddleOCR class: OK')"
        python -c "import easyocr; print('EasyOCR: OK')"
        python -c "import cv2; print('OpenCV:', cv2.__version__)"
        python -c "import torch; print('PyTorch:', torch.__version__)"
        python -c "import torchvision; print('torchvision:', torchvision.__version__)"
        python -c "import fitz; print('PyMuPDF:', fitz.__version__)"
        python -c "import docx; print('python-docx: OK')"
        python -c "import pdfplumber; print('pdfplumber: OK')"
        python -c "import numpy; print('numpy:', numpy.__version__)"
        python -c "import scipy; print('scipy:', scipy.__version__)"
        python -c "import shapely; print('shapely:', shapely.__version__)"
        Write-Host "=== 所有关键依赖验证通过 ==="

    # ─────────────────────────────────────────────
    # 步骤 6：准备 hooks 目录
    # ─────────────────────────────────────────────
    - name: Prepare hooks directory
      shell: pwsh
      run: |
        if (-Not (Test-Path "hooks")) {
          New-Item -ItemType Directory -Path "hooks" | Out-Null
        }
        if (Test-Path "hook-paddleocr.py") {
          Copy-Item "hook-paddleocr.py" "hooks/hook-paddleocr.py" -Force
          Write-Host "Copied hook-paddleocr.py"
        }
        if (Test-Path "hook-easyocr.py") {
          Copy-Item "hook-easyocr.py" "hooks/hook-easyocr.py" -Force
          Write-Host "Copied hook-easyocr.py"
        }

    # ─────────────────────────────────────────────
    # 步骤 7：预下载 OCR 模型（失败不阻断打包）
    # ─────────────────────────────────────────────
    - name: Pre-download OCR models
      shell: pwsh
      continue-on-error: true
      run: |
        python download_ocr_models.py
        if (-Not (Test-Path "ocr_models")) {
          New-Item -ItemType Directory -Path "ocr_models" | Out-Null
        }
        Write-Host "OCR models ready."

    # ─────────────────────────────────────────────
    # 步骤 8：生成 PyInstaller spec 文件
    # ─────────────────────────────────────────────
    - name: Generate PyInstaller spec file
      run: python create_spec.py

    # ─────────────────────────────────────────────
    # 步骤 9：执行打包
    # ─────────────────────────────────────────────
    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --clean --noconfirm FileFlowPro.spec

    # ─────────────────────────────────────────────
    # 步骤 10：检查构建产物
    # ─────────────────────────────────────────────
    - name: Verify build output
      shell: pwsh
      run: |
        if (Test-Path "dist\FileFlowPro.exe") {
          $size = (Get-Item "dist\FileFlowPro.exe").Length / 1MB
          Write-Host ("EXE 文件大小: {0:F1} MB" -f $size)
          Write-Host "=== 打包成功！==="
        } else {
          Write-Host "错误：未找到 dist\FileFlowPro.exe"
          dir dist\ 2>&1
          exit 1
        }

    # ─────────────────────────────────────────────
    # 步骤 11：上传构建产物（每次 push 都保存）
    # ─────────────────────────────────────────────
    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: FileFlowPro-Windows-OCR-v${{ github.run_number }}
        path: dist/FileFlowPro.exe
        retention-days: 30

    # ─────────────────────────────────────────────
    # 步骤 12：创建 GitHub Release（仅手动触发时）
    # ─────────────────────────────────────────────
    - name: Create GitHub Release
      if: github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2
      with:
        files: dist/FileFlowPro.exe
        tag_name: v${{ github.run_number }}-ocr
        name: "FileFlow Pro v${{ github.run_number }} (Windows 含OCR)"
        draft: false
        prerelease: false
        body: |
          ## FileFlow Pro Windows 版（含离线OCR）

          ### 功能特性
          - PDF 转 Word / Excel / PPT / 图片 / 文本
          - Word / Excel / PPT 转 PDF
          - 图片格式互转（PNG / JPG / WebP）
          - 文本转 PDF / Word
          - **OCR 扫描件识别（完全离线可用）**

          ### OCR 引擎
          - PaddleOCR v4（中英文 SOTA）
          - EasyOCR（备用引擎）
          - 支持中文、英文混合识别
          - 无需联网即可使用

          ### 使用方法
          1. 下载 `FileFlowPro.exe`
          2. 双击运行，无需安装
          3. 选择文件 → 选择目标格式 → 开始转换
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
